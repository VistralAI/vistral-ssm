schemaVersion: "2.2"
description: |
  Install NVIDIA GPU Operator and configure GPU time-slicing on worker nodes.

  This document:
  1. Verifies GPU hardware is present
  2. Installs NVIDIA GPU Operator via Helm (if not already installed)
  3. Configures GPU time-slicing (4 slices per T4)
  4. Verifies GPU device detection in K8s

  Guard: Skips if GPU Operator already running.
  Only runs on control plane nodes (needs kubectl/helm access).
  Always installs GPU Operator so CRDs exist before GPU workers join.

parameters:
  TimeSliceCount:
    type: String
    description: "Number of GPU time slices per physical GPU"
    default: "4"
  AWSRegion:
    type: String
    description: "AWS region"
    default: "us-east-1"

mainSteps:
  - action: aws:runShellScript
    name: setupGPU
    inputs:
      timeoutSeconds: 900
      runCommand:
        - |
          #!/bin/bash
          set -e

          TIME_SLICE_COUNT="{{TimeSliceCount}}"

          LOG="/var/log/vistral-gpu-setup.log"
          exec > >(tee -a "$LOG") 2>&1

          echo "=============================================="
          echo "GPU Operator Setup - $(date)"
          echo "=============================================="

          HOSTNAME=$(hostname | tr '[:upper:]' '[:lower:]')

          # Only run on control plane (needs kubectl/helm)
          if [ ! -f /etc/kubernetes/admin.conf ]; then
              echo "Not a control plane node. Skipping GPU setup."
              exit 0
          fi
          export KUBECONFIG=/etc/kubernetes/admin.conf

          # Guard: check if GPU Operator is already deployed
          if kubectl get pods -n gpu-operator -l app=gpu-operator 2>/dev/null | grep -q Running; then
              echo "GPU Operator already running. Skipping installation."

              # Still check time-slicing config
              if kubectl get configmap -n gpu-operator gpu-time-slicing-config &>/dev/null; then
                  echo "Time-slicing config already exists."
                  exit 0
              fi
          else
              echo "Installing GPU Operator (pre-provisioning for GPU workers)..."

              # Ensure Helm is installed
              if ! command -v helm &>/dev/null; then
                  echo "Installing Helm..."
                  curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
              fi

              # Add NVIDIA Helm repo
              helm repo add nvidia https://helm.ngc.nvidia.com/nvidia 2>/dev/null || true
              helm repo update

              # Install GPU Operator with R550 driver (supports both T4 and P4)
              helm install gpu-operator nvidia/gpu-operator \
                  --namespace gpu-operator \
                  --create-namespace \
                  --set driver.enabled=true \
                  --set driver.version="550.163.01" \
                  --set driver.repoConfig.configMapName="t2-repo-config" \
                  --set toolkit.enabled=true \
                  --set devicePlugin.enabled=true \
                  --set gfd.enabled=true \
                  --set migManager.enabled=false \
                  --set dcgmExporter.enabled=true \
                  --wait --timeout 10m

              echo "GPU Operator installed"

              # T2 Mac kernel headers fix:
              # The driver container needs the T2 apt repo to download kernel
              # headers for custom T2 kernels. The repo sources list is mounted
              # via repoConfig ConfigMap. Use trusted=yes to skip GPG verification
              # inside the container (the host already verified packages on install).
              echo "Configuring T2 kernel header support..."

              kubectl create configmap t2-repo-config -n gpu-operator \
                  --from-literal=t2.list="deb [trusted=yes] https://adityagarg8.github.io/t2-ubuntu-repo ./
          deb [trusted=yes] https://github.com/AdityaGarg8/t2-ubuntu-repo/releases/download/noble ./" \
                  --dry-run=client -o yaml | kubectl apply -f -

              echo "T2 kernel header support configured"
          fi

          # Configure GPU time-slicing
          echo "Configuring GPU time-slicing ($TIME_SLICE_COUNT slices per GPU)..."
          kubectl apply -f - <<TIMESLICE
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: gpu-time-slicing-config
            namespace: gpu-operator
          data:
            any: |-
              version: v1
              flags:
                migStrategy: none
              sharing:
                timeSlicing:
                  renameByDefault: false
                  failRequestsGreaterThanOne: false
                  resources:
                    - name: nvidia.com/gpu
                      replicas: $TIME_SLICE_COUNT
          TIMESLICE

          # Patch GPU Operator ClusterPolicy to use time-slicing config
          kubectl patch clusterpolicy/cluster-policy \
              -n gpu-operator \
              --type merge \
              -p '{"spec":{"devicePlugin":{"config":{"name":"gpu-time-slicing-config","default":"any"}}}}' \
              2>/dev/null || echo "ClusterPolicy patch skipped (may need manual config)"

          echo "Waiting for GPU device plugin to restart..."
          kubectl rollout restart daemonset -n gpu-operator nvidia-device-plugin-daemonset 2>/dev/null || true
          sleep 30

          # Verify GPU resources
          echo "Verifying GPU resources..."
          kubectl get nodes -o custom-columns="NAME:.metadata.name,GPU:.status.allocatable.nvidia\.com/gpu" 2>/dev/null || true

          echo "=============================================="
          echo "GPU setup complete at $(date)"
          echo "=============================================="
