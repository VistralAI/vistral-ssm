schemaVersion: "2.2"
description: |
  Idempotent host cleanup for existing cluster nodes.

  - Holds kernel meta-packages (linux-image-*, linux-headers-*, and the
    Ubuntu version-specific meta linux-generic-* / linux-t2-lts) so
    unattended-upgrades can't drift the kernel out from under the cluster.
    Mirrors the apt-mark hold the autoinstall templates apply at provision
    time (vistral-bootstrap commit b764e2b, 2026-05-06) — closes the gap
    for nodes that were provisioned before that change.
  - Disables + masks legacy `coredns@primary.service` and
    `coredns@secondary.service` units that were installed by the now-
    archived `vistral-dns-cluster` repo. They fight kubelet's in-cluster
    coredns pod for port 53 and crashloop hundreds of times an hour
    (observed 318 restarts in 10 min on vausk01, 2026-05-06).
  - Disables + masks `wol-enable.service` if it failed to start (legacy
    bug from before vistral-wol-setup commit fixing the unit-file
    template). The replacement service from vistral-wol-setup will be
    regenerated cleanly on the next run.

  Idempotent: safe to run repeatedly. Each step short-circuits if state
  is already correct.

parameters:
  AWSRegion:
    type: String
    description: "AWS region"
    default: "us-east-1"

mainSteps:
  - action: aws:runShellScript
    name: hostCleanup
    inputs:
      timeoutSeconds: 300
      runCommand:
        - |
          #!/bin/bash
          set -e

          LOG="/var/log/vistral-host-cleanup.log"
          exec > >(tee -a "$LOG") 2>&1

          echo "=========================================="
          echo "Vistral Host Cleanup - $(date)"
          echo "=========================================="

          # ---------- 1. Hold kernel meta-packages ----------
          # apt-mark holds are idempotent (re-holding is a no-op). Match
          # whichever meta-package the install picked.
          KERNEL_PKGS=()
          for pkg in linux-generic linux-generic-hwe-22.04 linux-t2-lts \
                     linux-image-generic linux-headers-generic; do
            if dpkg -l "$pkg" 2>/dev/null | grep -qE "^ii\s+$pkg\s"; then
              KERNEL_PKGS+=("$pkg")
            fi
          done
          if [[ ${#KERNEL_PKGS[@]} -gt 0 ]]; then
            echo "Holding kernel meta-packages: ${KERNEL_PKGS[*]}"
            apt-mark hold "${KERNEL_PKGS[@]}" || true
          else
            echo "No kernel meta-packages found to hold (unusual; skipping)"
          fi

          # Also hold any installed nvidia driver packages on GPU nodes.
          NVIDIA_PKGS=()
          for pkg in $(dpkg -l 2>/dev/null | awk '/^ii\s+(nvidia-driver-[0-9]+|nvidia-dkms-[0-9]+)\s/ {print $2}'); do
            NVIDIA_PKGS+=("$pkg")
          done
          if [[ ${#NVIDIA_PKGS[@]} -gt 0 ]]; then
            echo "Holding nvidia driver packages: ${NVIDIA_PKGS[*]}"
            apt-mark hold "${NVIDIA_PKGS[@]}" || true
          fi

          echo "Current apt-mark holds:"
          apt-mark showhold || true

          # ---------- 2. Disable legacy host coredns ----------
          # Templated systemd units (coredns@primary, coredns@secondary)
          # don't show in `list-unit-files` (that only lists templates).
          # Use `is-active` / `is-enabled` to detect running instances.
          # The template itself (`coredns@.service`) is also masked so
          # nothing can re-spawn instances on next boot.
          coredns_was_disabled=0
          for instance in primary secondary; do
            unit="coredns@${instance}.service"
            active="$(systemctl is-active "$unit" 2>/dev/null || true)"
            enabled="$(systemctl is-enabled "$unit" 2>/dev/null || true)"
            if [[ "$active" == "active" || "$active" == "activating" ]]; then
              echo "Stopping $unit (was $active; legacy host CoreDNS)"
              systemctl stop "$unit" || true
              coredns_was_disabled=1
            fi
            if [[ "$enabled" =~ ^(enabled|alias|enabled-runtime)$ ]]; then
              echo "Disabling $unit (was $enabled)"
              systemctl disable "$unit" || true
              coredns_was_disabled=1
            fi
            if [[ "$enabled" != "masked" && "$active" != "inactive" ]] || systemctl is-active --quiet "$unit"; then
              echo "Masking $unit so it can't re-spawn"
              systemctl mask "$unit" 2>/dev/null || true
            fi
          done

          # Also mask the template itself so future enables can't spawn instances.
          if systemctl list-unit-files coredns@.service 2>/dev/null | grep -qE "coredns@\.service"; then
            tmpl_state="$(systemctl is-enabled coredns@.service 2>/dev/null || true)"
            if [[ "$tmpl_state" != "masked" ]]; then
              echo "Masking coredns@.service template"
              systemctl mask coredns@.service 2>/dev/null || true
            fi
          fi

          # Clean up the leftover /etc/coredns/ dir once nothing references it.
          if ! systemctl is-active --quiet 'coredns@*.service' 2>/dev/null; then
            if [[ -d /etc/coredns ]]; then
              echo "Removing orphaned /etc/coredns directory"
              rm -rf /etc/coredns
            fi
          fi

          # ---------- 2b. Restart systemd-resolved if we just freed :53 ----------
          # CRITICAL: when the legacy host coredns@primary was running at
          # boot, it occupied 127.0.0.53:53 *before* systemd-resolved
          # could bind there. Resolved logged
          #   Another process is already listening on UDP socket 127.0.0.53:53.
          #   Turning off local DNS stub support.
          # and disabled its stub for the lifetime of the process.
          # /etc/resolv.conf still pointed at 127.0.0.53 — but those
          # queries went to coredns. Now that we just stopped coredns,
          # the port is free, but resolved doesn't auto-detect that —
          # its stub stays disabled and DNS dies for the host (kubelet
          # image pulls fail with "lookup X on 127.0.0.53:53: connection
          # refused"). Forcing a restart re-evaluates the port. Skip if
          # resolved isn't actually installed (rare, but defensive).
          if [[ "$coredns_was_disabled" -eq 1 ]] && systemctl list-unit-files systemd-resolved.service 2>/dev/null | grep -q systemd-resolved; then
            echo "Restarting systemd-resolved so it can re-bind 127.0.0.53:53 now that legacy coredns is gone"
            systemctl restart systemd-resolved || true
            sleep 2
            # Quick verification — fail loudly if the stub still didn't come up.
            if ! awk 'NR>1 && $2 ~ /:0035$/' /proc/net/udp /proc/net/udp6 2>/dev/null | grep -q .; then
              echo "WARNING: nothing listening on :53 after resolved restart — DNS may still be broken"
              echo "         check 'journalctl -u systemd-resolved -n 30' for clues"
            else
              echo "  resolved is now listening on :53 — DNS restored"
            fi
          fi

          # ---------- 2c. Raise inotify limits ----------
          # Default Ubuntu has fs.inotify.max_user_instances=128 which
          # is too low for a kubernetes worker. Promtail tails every
          # container's stdout log and needs ~1 instance per log file.
          # NPD adds another ~5 watches per node. Loki shippers, fluentd,
          # vector etc all consume instances. 128 → 8192 matches what
          # most managed kubernetes distros (EKS, GKE, AKS) ship.
          # Persist via /etc/sysctl.d/ so it survives reboot.
          INOTIFY_CONF=/etc/sysctl.d/99-vistral-inotify.conf
          if [[ ! -f "$INOTIFY_CONF" ]] || ! grep -q "^fs.inotify.max_user_instances=8192" "$INOTIFY_CONF"; then
            echo "Raising fs.inotify limits (was: instances=$(sysctl -n fs.inotify.max_user_instances), watches=$(sysctl -n fs.inotify.max_user_watches))"
            # Avoid heredoc here — the YAML block scalar needs the script
            # body at consistent indentation, but a heredoc body must be
            # at column 0 to write a properly formatted sysctl.d file.
            # printf with explicit newlines sidesteps both constraints.
            printf 'fs.inotify.max_user_instances=8192\nfs.inotify.max_user_watches=1048576\n' > "$INOTIFY_CONF"
            sysctl -p "$INOTIFY_CONF" >/dev/null
            echo "  now: instances=$(sysctl -n fs.inotify.max_user_instances), watches=$(sysctl -n fs.inotify.max_user_watches)"
          else
            echo "fs.inotify limits already raised"
          fi

          # ---------- 3. Remove broken wol-enable.service ----------
          # The pre-fix unit had a malformed ethtool command (the bash
          # `$()` newline-stripping bug in vistral-wol-setup that
          # concatenated `RemainAfterExit=yes` onto the last ExecStart
          # line). It fails every boot with:
          #   ethtool (-s): invalid char 'R' in 'gRemainAfterExit=yes' for parameter 'wol'
          # We can't `systemctl mask` it cleanly because the file already
          # exists at /etc/systemd/system/wol-enable.service (mask creates
          # a symlink to /dev/null and won't overwrite a real file).
          # Delete the broken file outright; vistral-wol-setup will
          # regenerate a correct one on its next invocation.
          if systemctl is-failed wol-enable.service 2>/dev/null | grep -q failed; then
            echo "Disabling failed wol-enable.service"
            systemctl disable wol-enable.service 2>/dev/null || true
            if [[ -f /etc/systemd/system/wol-enable.service ]]; then
              echo "Removing broken /etc/systemd/system/wol-enable.service (will be regenerated by vistral-wol-setup)"
              rm -f /etc/systemd/system/wol-enable.service
              systemctl daemon-reload
            fi
          fi

          echo "=========================================="
          echo "Host cleanup complete - $(date)"
          echo "=========================================="
          exit 0
