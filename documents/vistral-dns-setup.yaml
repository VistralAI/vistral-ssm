schemaVersion: "2.2"
description: |
  Install and configure native CoreDNS on cluster nodes.
  - Control plane nodes: Install CoreDNS as systemd service, configure zones
  - Worker nodes: Configure /etc/resolv.conf to use control plane DNS servers

  This document:
  1. Detects node role from hostname
  2. Control planes: Downloads CoreDNS, creates zones, starts systemd service
  3. Workers: Points resolv.conf at control plane DNS servers
  4. All nodes: Tests DNS resolution

  Guard: Skips if CoreDNS is already running (control planes) or resolv.conf
  already configured (workers).

parameters:
  CoreDNSVersion:
    type: String
    description: "CoreDNS version to install"
    default: "1.11.1"
  VipAddress:
    type: String
    description: "Kubernetes API VIP address"
    default: "192.168.1.204"
  AWSRegion:
    type: String
    description: "AWS region for SSM Parameter Store"
    default: "us-east-1"

mainSteps:
  - action: aws:runShellScript
    name: setupDNS
    inputs:
      timeoutSeconds: 600
      runCommand:
        - |
          #!/bin/bash
          set -e

          COREDNS_VERSION="{{CoreDNSVersion}}"
          VIP_ADDRESS="{{VipAddress}}"
          AWS_REGION="{{AWSRegion}}"

          LOG="/var/log/vistral-dns-setup.log"
          exec > >(tee -a "$LOG") 2>&1

          echo "=============================================="
          echo "Vistral DNS Setup - $(date)"
          echo "=============================================="

          HOSTNAME=$(hostname | tr '[:upper:]' '[:lower:]')
          echo "Hostname: $HOSTNAME"

          # Determine role from hostname
          if [[ "$HOSTNAME" =~ ^vausk[0-9]+$ ]]; then
              ROLE="control-plane"
              echo "Role: Control Plane — will install CoreDNS"
          elif [[ "$HOSTNAME" =~ ^vausw[0-9]+$ ]] || [[ "$HOSTNAME" =~ ^vausm[0-9]+$ ]]; then
              ROLE="worker"
              echo "Role: Worker — will configure DNS client"
          else
              echo "Unknown hostname pattern: $HOSTNAME. Skipping DNS setup."
              exit 0
          fi

          # Skip if not yet part of a cluster
          if [ ! -f /etc/kubernetes/kubelet.conf ]; then
              echo "Node not yet in K8s cluster. DNS setup will run after join."
              exit 0
          fi

          # ============================================
          # CONTROL PLANE: Install CoreDNS
          # ============================================
          if [ "$ROLE" = "control-plane" ]; then

              # Guard: skip if CoreDNS already running
              if systemctl is-active --quiet coredns@primary.service 2>/dev/null; then
                  echo "CoreDNS already running. Skipping installation."
                  exit 0
              fi

              echo "Installing CoreDNS v${COREDNS_VERSION}..."

              # Detect architecture
              ARCH=$(uname -m)
              case $ARCH in
                  x86_64) COREDNS_ARCH="amd64" ;;
                  aarch64|arm64) COREDNS_ARCH="arm64" ;;
                  *) echo "Unsupported arch: $ARCH"; exit 1 ;;
              esac

              # Create user and directories
              if ! id coredns &>/dev/null; then
                  useradd --system --shell /bin/false --home-dir /var/lib/coredns --create-home --user-group coredns
              fi
              mkdir -p /etc/coredns/zones /var/log/coredns /var/lib/coredns
              chown -R coredns:coredns /var/log/coredns /var/lib/coredns

              # Download CoreDNS
              cd /tmp
              curl -L -o coredns.tgz "https://github.com/coredns/coredns/releases/download/v${COREDNS_VERSION}/coredns_${COREDNS_VERSION}_linux_${COREDNS_ARCH}.tgz"
              tar -xzf coredns.tgz
              mv coredns /usr/local/bin/
              chmod +x /usr/local/bin/coredns
              rm -f coredns.tgz

              # Detect network info
              LOCAL_IP=$(ip route get 8.8.8.8 | awk '{print $7}' | head -1)
              GATEWAY_IP=$(ip route | grep default | awk '{print $3}' | head -1)
              NETWORK_RANGE=$(echo "$LOCAL_IP" | cut -d. -f1-3)

              # Get K8s DNS IP
              K8S_DNS_IP="10.96.0.10"
              if command -v kubectl &>/dev/null; then
                  K8S_DNS_IP=$(kubectl get svc -n kube-system kube-dns -o jsonpath='{.spec.clusterIP}' 2>/dev/null || echo "10.96.0.10")
              fi

              # Detect all control plane IPs
              CP_IPS=()
              if command -v kubectl &>/dev/null; then
                  while IFS= read -r ip; do
                      [ -n "$ip" ] && CP_IPS+=("$ip")
                  done < <(kubectl get nodes -l node-role.kubernetes.io/control-plane -o jsonpath='{range .items[*]}{.status.addresses[?(@.type=="InternalIP")].address}{"\n"}{end}' 2>/dev/null)
              fi
              # Fallback to known hostnames (IPv4 only)
              if [ ${#CP_IPS[@]} -eq 0 ]; then
                  for h in vausk01 vausk02 vausk03; do
                      ip=$(getent hosts "$h" 2>/dev/null | awk '{print $1}' | head -1)
                      if [[ -n "$ip" && "$ip" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                          CP_IPS+=("$ip")
                      fi
                  done
              fi
              # Final fallback to local IP
              [ ${#CP_IPS[@]} -eq 0 ] && CP_IPS=("$LOCAL_IP")

              CP1="${CP_IPS[0]:-$LOCAL_IP}"
              CP2="${CP_IPS[1]:-$LOCAL_IP}"
              CP3="${CP_IPS[2]:-$LOCAL_IP}"
              CP1_LAST="${CP1##*.}"
              CP2_LAST="${CP2##*.}"
              CP3_LAST="${CP3##*.}"
              GW_LAST="${GATEWAY_IP##*.}"

              echo "Local IP: $LOCAL_IP"
              echo "Gateway: $GATEWAY_IP"
              echo "K8s DNS: $K8S_DNS_IP"
              echo "Control planes: $CP1, $CP2, $CP3"

              # Write Corefile
              cat > /etc/coredns/Corefile.primary << COREFILE
          .:53 {
              forward . ${GATEWAY_IP} 8.8.8.8 8.8.4.4 {
                  policy sequential
                  health_check 5s
                  prefer_udp
              }
              log
              errors
              health :8080 {
                  lameduck 5s
              }
              prometheus :9153
              cache 300 {
                  success 9984 30
                  denial 9984 5
                  prefetch 10
                  serve_stale
              }
              loadbalance round_robin
              reload
          }

          vistral:53 {
              file /etc/coredns/zones/vistral.zone vistral {
                  reload 10s
              }
              forward . ${K8S_DNS_IP} {
                  policy sequential
                  health_check 5s
              }
              log
              errors
              cache 60 {
                  success 1024 10
                  denial 1024 2
              }
              loadbalance round_robin
              reload
          }

          cluster.local:53 {
              forward . ${K8S_DNS_IP} {
                  policy sequential
                  health_check 5s
              }
              log
              errors
              cache 30 {
                  success 512 5
                  denial 512 2
              }
              loadbalance round_robin
          }

          ${NETWORK_RANGE}.in-addr.arpa:53 {
              file /etc/coredns/zones/reverse.zone ${NETWORK_RANGE}.in-addr.arpa {
                  reload 10s
              }
              log
              errors
              cache 300 {
                  success 1024 30
                  denial 1024 5
              }
          }
          COREFILE

              # Write vistral zone
              SERIAL=$(date +%Y%m%d)01
              cat > /etc/coredns/zones/vistral.zone << ZONE
          \$ORIGIN vistral.
          \$TTL 300

          @   IN SOA dns1.vistral. admin.vistral. (
              ${SERIAL}  ; Serial
              3600       ; Refresh
              1800       ; Retry
              1209600    ; Expire
              300        ; Minimum TTL
          )

          @       IN NS   dns1.vistral.
          @       IN NS   dns2.vistral.
          @       IN NS   dns3.vistral.

          dns1    IN A    ${CP1}
          dns2    IN A    ${CP2}
          dns3    IN A    ${CP3}

          vausk01 IN A    ${CP1}
          vausk02 IN A    ${CP2}
          vausk03 IN A    ${CP3}

          balance IN A    ${CP1}
          @       IN A    ${CP1}
          gateway IN A    ${GATEWAY_IP}

          ingress IN A    ${CP1}

          cvat        IN CNAME ingress.vistral.
          longhorn    IN CNAME ingress.vistral.
          k8          IN CNAME ingress.vistral.
          k8s         IN CNAME ingress.vistral.
          dashboard   IN CNAME ingress.vistral.
          storage     IN CNAME ingress.vistral.
          files       IN CNAME ingress.vistral.
          tao         IN CNAME ingress.vistral.
          jupyter     IN CNAME ingress.vistral.
          grafana     IN CNAME ingress.vistral.
          prometheus  IN CNAME ingress.vistral.
          mlflow      IN CNAME ingress.vistral.
          dagster     IN CNAME ingress.vistral.
          fiftyone    IN CNAME ingress.vistral.
          semaphore   IN CNAME ingress.vistral.

          www         IN CNAME balance.vistral.
          api         IN CNAME balance.vistral.

          *           IN A    ${CP1}
          ZONE

              # Write reverse zone
              cat > /etc/coredns/zones/reverse.zone << RZONE
          \$ORIGIN ${NETWORK_RANGE}.in-addr.arpa.
          \$TTL 300

          @   IN SOA dns1.vistral. admin.vistral. (
              ${SERIAL}  ; Serial
              3600       ; Refresh
              1800       ; Retry
              1209600    ; Expire
              300        ; Minimum TTL
          )

          @       IN NS   dns1.vistral.
          @       IN NS   dns2.vistral.
          @       IN NS   dns3.vistral.

          ${CP1_LAST}  IN PTR  vausk01.vistral.
          ${CP1_LAST}  IN PTR  dns1.vistral.
          ${CP2_LAST}  IN PTR  vausk02.vistral.
          ${CP2_LAST}  IN PTR  dns2.vistral.
          ${CP3_LAST}  IN PTR  vausk03.vistral.
          ${CP3_LAST}  IN PTR  dns3.vistral.
          ${GW_LAST}   IN PTR  gateway.vistral.
          RZONE

              # Set permissions
              chown -R root:coredns /etc/coredns
              chmod -R 644 /etc/coredns/*
              chmod 755 /etc/coredns /etc/coredns/zones

              # Install systemd service
              cat > /etc/systemd/system/coredns@.service << 'SYSTEMD'
          [Unit]
          Description=CoreDNS DNS server - Instance %i
          Documentation=https://coredns.io/manual/
          After=network.target
          Wants=network.target

          [Service]
          Type=simple
          User=coredns
          Group=coredns
          ExecStart=/usr/local/bin/coredns -conf /etc/coredns/Corefile.%i
          ExecReload=/bin/kill -SIGUSR1 $MAINPID
          Restart=always
          RestartSec=5s
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=coredns-%i

          NoNewPrivileges=true
          PrivateTmp=true
          PrivateDevices=true
          ProtectHome=true
          ProtectSystem=strict
          ReadWritePaths=/var/log/coredns /var/lib/coredns
          CapabilityBoundingSet=CAP_NET_BIND_SERVICE CAP_SETGID CAP_SETUID
          AmbientCapabilities=CAP_NET_BIND_SERVICE

          LimitNOFILE=65536
          LimitNPROC=4096
          Environment=GOMAXPROCS=2

          [Install]
          WantedBy=multi-user.target
          SYSTEMD

              systemctl daemon-reload

              # Stop systemd-resolved (conflicts with port 53)
              for svc in systemd-resolved dnsmasq bind9 named; do
                  if systemctl is-active --quiet "$svc" 2>/dev/null; then
                      echo "Stopping $svc..."
                      systemctl stop "$svc"
                      systemctl disable "$svc"
                  fi
              done

              # Configure firewall
              if command -v ufw &>/dev/null; then
                  ufw allow 53/udp comment "CoreDNS" || true
                  ufw allow 53/tcp comment "CoreDNS" || true
                  ufw allow 8080/tcp comment "CoreDNS Health" || true
                  ufw allow 9153/tcp comment "CoreDNS Metrics" || true
              fi

              # Start CoreDNS
              systemctl enable coredns@primary.service
              systemctl start coredns@primary.service
              sleep 2

              if systemctl is-active --quiet coredns@primary.service; then
                  echo "CoreDNS started successfully"
              else
                  echo "ERROR: CoreDNS failed to start"
                  systemctl status coredns@primary.service
                  exit 1
              fi

              # Update resolv.conf
              cat > /etc/resolv.conf << RESOLV
          nameserver 127.0.0.1
          nameserver 8.8.8.8
          nameserver 8.8.4.4
          search vistral cluster.local
          options timeout:2
          options attempts:3
          RESOLV

              # Create containerd DNS symlink
              mkdir -p /run/systemd/resolve
              ln -sf /etc/resolv.conf /run/systemd/resolve/resolv.conf

              echo "CoreDNS installation complete on $HOSTNAME"
          fi

          # ============================================
          # WORKER: Configure DNS client
          # ============================================
          if [ "$ROLE" = "worker" ]; then

              # Guard: skip if already configured
              if grep -q "Vistral DNS" /etc/resolv.conf 2>/dev/null; then
                  echo "DNS already configured. Skipping."
                  exit 0
              fi

              echo "Configuring worker DNS..."

              # Get control plane IPs from SSM Parameter Store or detect via cluster
              CP_IPS=()
              if command -v kubectl &>/dev/null; then
                  while IFS= read -r ip; do
                      [ -n "$ip" ] && CP_IPS+=("$ip")
                  done < <(kubectl get nodes -l node-role.kubernetes.io/control-plane -o jsonpath='{range .items[*]}{.status.addresses[?(@.type=="InternalIP")].address}{"\n"}{end}' 2>/dev/null)
              fi

              # Fallback to known hostnames (IPv4 only)
              if [ ${#CP_IPS[@]} -eq 0 ]; then
                  for h in vausk01 vausk02 vausk03; do
                      ip=$(getent hosts "$h" 2>/dev/null | awk '{print $1}' | head -1)
                      if [[ -n "$ip" && "$ip" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                          CP_IPS+=("$ip")
                      fi
                  done
              fi

              if [ ${#CP_IPS[@]} -eq 0 ]; then
                  echo "ERROR: Could not discover control plane IPs"
                  exit 1
              fi

              # Stop systemd-resolved
              systemctl stop systemd-resolved 2>/dev/null || true
              systemctl disable systemd-resolved 2>/dev/null || true

              # Remove symlink if present
              [ -L /etc/resolv.conf ] && rm -f /etc/resolv.conf

              # Write resolv.conf
              cat > /etc/resolv.conf << RESOLV
          # Vistral DNS Configuration
          # Auto-generated by vistral-dns-setup SSM document
          RESOLV

              for ip in "${CP_IPS[@]}"; do
                  echo "nameserver $ip" >> /etc/resolv.conf
              done

              cat >> /etc/resolv.conf << RESOLV

          nameserver 8.8.8.8
          nameserver 8.8.4.4

          search vistral cluster.local
          options timeout:2
          options attempts:3
          options rotate
          RESOLV

              # Make immutable to prevent systemd-resolved overwrite
              chattr +i /etc/resolv.conf

              # Create containerd DNS symlink
              mkdir -p /run/systemd/resolve
              ln -sf /etc/resolv.conf /run/systemd/resolve/resolv.conf

              # Restart containerd
              if systemctl is-active --quiet containerd; then
                  systemctl restart containerd
                  echo "containerd restarted with new DNS config"
              fi

              echo "Worker DNS configuration complete on $HOSTNAME"
          fi

          # ============================================
          # Test DNS resolution
          # ============================================
          echo "Testing DNS resolution..."
          if nslookup google.com 127.0.0.1 &>/dev/null || nslookup google.com &>/dev/null; then
              echo "External DNS: OK"
          else
              echo "WARNING: External DNS resolution failed"
          fi

          echo "=============================================="
          echo "DNS setup completed at $(date)"
          echo "=============================================="
