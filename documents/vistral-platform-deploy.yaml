schemaVersion: "2.2"
description: |
  Deploy vistral-stack on the primary control plane. Thin wrapper around
  vistral-stack/deploy.sh — that script is the single source of truth for
  install/upgrade logic. The SSM doc handles concerns specific to remote
  invocation (deploy-key handling, idempotency-skip-if-healthy, log path).

  Layout: vistral-stack is an App-of-Apps repo with 5 top-level Helm
  charts (platform-infra, platform-core, platform-monitoring,
  vistral-workloads, automation) plus an apps/ chart that generates
  ArgoCD Applications. The pre-2026-04-12 monolith Chart.yaml at root
  was deleted in commit 7764916.

  Guard: Skips when every top-level release is `deployed` AND every
  Deployment is Available AND every StatefulSet is fully ready AND no
  pods are stuck Pending/Failed. Anything less re-runs deploy.sh, which
  is itself idempotent.

parameters:
  DeployKeySecretName:
    type: String
    description: "AWS Secrets Manager secret containing GitHub deploy key for vistral-stack"
    default: "vistral-github-deploy-key-platform"
  PlatformRepo:
    type: String
    description: "GitHub repository URL for vistral-stack (SSH format)"
    default: "git@github.com:VistralAI/vistral-stack.git"
  AWSRegion:
    type: String
    description: "AWS region"
    default: "us-east-1"
  Namespace:
    type: String
    description: "Default platform namespace"
    default: "vistral-platform"
  ValuesOverride:
    type: String
    description: "Optional base64-encoded values YAML override (passed via VALUES_FILE env)"
    default: ""

mainSteps:
  - action: aws:runShellScript
    name: deployPlatform
    inputs:
      timeoutSeconds: 3600
      runCommand:
        - |
          #!/bin/bash
          set -e
          export HOME=/root

          DEPLOY_KEY_SECRET="{{DeployKeySecretName}}"
          PLATFORM_REPO="{{PlatformRepo}}"
          AWS_REGION="{{AWSRegion}}"
          NAMESPACE="{{Namespace}}"
          VALUES_OVERRIDE="{{ValuesOverride}}"
          CHART_DIR="/opt/vistral-stack"

          LOG="/var/log/vistral-platform-deploy.log"
          exec > >(tee -a "$LOG") 2>&1

          echo "=============================================="
          echo "Platform Deployment - $(date)"
          echo "=============================================="

          # =========================================================
          # Guard: only run on primary control plane
          # =========================================================
          if [ ! -f /etc/kubernetes/admin.conf ]; then
              echo "Not a control plane. Skipping platform deploy."
              exit 0
          fi
          export KUBECONFIG=/etc/kubernetes/admin.conf

          HOSTNAME=$(hostname | tr '[:upper:]' '[:lower:]')
          if [ "$HOSTNAME" != "vausk01" ]; then
              echo "Platform deploy runs only on vausk01. Current: $HOSTNAME. Skipping."
              exit 0
          fi

          # =========================================================
          # Idempotency guard (P1 #6): skip only if EVERY top-level
          # release is `deployed` AND the platform namespace looks
          # healthy. Any failure short-circuits and re-runs deploy.sh.
          # =========================================================
          PLATFORM_HEALTHY=true
          REQUIRED_RELEASES="platform-infra platform-core platform-monitoring vistral-workloads automation"
          for r in $REQUIRED_RELEASES; do
              S=$(helm status "$r" -n "$NAMESPACE" -o json 2>/dev/null | jq -r '.info.status' 2>/dev/null || echo "missing")
              if [ "$S" != "deployed" ]; then
                  echo "Release $r status=$S (need deployed) — re-running deploy"
                  PLATFORM_HEALTHY=false
                  break
              fi
          done
          if [ "$PLATFORM_HEALTHY" = "true" ]; then
              if ! kubectl -n "$NAMESPACE" wait deployment --all \
                      --for=condition=Available --timeout=15s &>/dev/null; then
                  echo "Some Deployment in $NAMESPACE not Available — re-running deploy"
                  PLATFORM_HEALTHY=false
              fi
          fi
          if [ "$PLATFORM_HEALTHY" = "true" ]; then
              while IFS=$'\t' read -r name desired ready; do
                  [ -z "$name" ] && continue
                  if [ "${ready:-0}" != "$desired" ]; then
                      echo "StatefulSet $name not fully ready ($ready/$desired) — re-running deploy"
                      PLATFORM_HEALTHY=false
                      break
                  fi
              done < <(kubectl -n "$NAMESPACE" get statefulset \
                      -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.replicas}{"\t"}{.status.readyReplicas}{"\n"}{end}' 2>/dev/null)
          fi
          if [ "$PLATFORM_HEALTHY" = "true" ]; then
              STUCK=$(kubectl -n "$NAMESPACE" get pods \
                  --field-selector=status.phase!=Running,status.phase!=Succeeded \
                  -o name 2>/dev/null | wc -l | tr -d ' ')
              if [ "$STUCK" -gt 0 ]; then
                  echo "$STUCK pod(s) stuck Pending/Failed — re-running deploy"
                  PLATFORM_HEALTHY=false
              fi
          fi
          if [ "$PLATFORM_HEALTHY" = "true" ]; then
              echo "All releases deployed and healthy. Skipping."
              exit 0
          fi

          # =========================================================
          # Prerequisites: AWS CLI + Helm + jq
          # =========================================================
          if ! command -v aws &>/dev/null; then
              echo "Installing AWS CLI v2..."
              cd /tmp
              curl -sL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
              unzip -q awscliv2.zip
              ./aws/install --update
              rm -rf awscliv2.zip aws
          fi
          if ! command -v helm &>/dev/null; then
              echo "Installing Helm..."
              curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          fi
          if ! command -v jq &>/dev/null; then
              apt-get update -qq && apt-get install -y -qq jq 2>&1 || true
          fi

          # =========================================================
          # Clone vistral-stack
          # =========================================================
          DEPLOY_KEY=$(aws secretsmanager get-secret-value \
              --secret-id "$DEPLOY_KEY_SECRET" \
              --region "$AWS_REGION" \
              --query SecretString --output text) \
              || { echo "ERROR: failed to read deploy key from $DEPLOY_KEY_SECRET"; exit 1; }

          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/github_deploy
          chmod 600 ~/.ssh/github_deploy
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/github_deploy -o StrictHostKeyChecking=no"

          echo "Cloning $PLATFORM_REPO -> $CHART_DIR"
          rm -rf "$CHART_DIR"
          git clone "$PLATFORM_REPO" "$CHART_DIR" || { echo "ERROR: git clone failed"; rm -f ~/.ssh/github_deploy; exit 1; }

          # =========================================================
          # Materialize values override (if provided)
          # =========================================================
          if [ -n "$VALUES_OVERRIDE" ]; then
              echo "$VALUES_OVERRIDE" | base64 -d > /tmp/override-values.yaml
              export VALUES_FILE=/tmp/override-values.yaml
          fi

          # =========================================================
          # Delegate to vistral-stack/deploy.sh — single source of
          # truth for install/upgrade logic (App-of-Apps layout).
          # deploy.sh handles SSM lookup + per-chart install + ArgoCD
          # bootstrap + App-of-Apps chart.
          # =========================================================
          export AWS_PROFILE="${AWS_PROFILE:-}"   # SSM agent runs under instance role; profile not needed
          export AWS_REGION
          export NAMESPACE
          export KUBECONFIG

          if [ ! -x "$CHART_DIR/deploy.sh" ]; then
              chmod +x "$CHART_DIR/deploy.sh"
          fi

          bash "$CHART_DIR/deploy.sh"
          DEPLOY_RC=$?

          # Cleanup
          rm -f ~/.ssh/github_deploy
          rm -f /tmp/override-values.yaml

          if [ "$DEPLOY_RC" -ne 0 ]; then
              echo "FATAL: deploy.sh exited with $DEPLOY_RC"
              exit "$DEPLOY_RC"
          fi

          echo "=============================================="
          echo "Platform deployment complete at $(date)"
          echo "=============================================="
