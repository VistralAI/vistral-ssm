schemaVersion: "2.2"
description: |
  Deploy vistral-platform-v3 Helm chart and bootstrap ArgoCD.
  Runs on the primary control plane after the cluster is fully formed.

  This document:
  1. Clones vistral-platform-v3 from GitHub
  2. Builds Helm dependencies
  3. Installs the platform chart (or upgrades if already installed)
  4. Bootstraps ArgoCD

  Guard: Skips if vistral-platform is already deployed and healthy.

parameters:
  DeployKeySecretName:
    type: String
    description: "AWS Secrets Manager secret name containing GitHub deploy key"
    default: "vistral-github-deploy-key-platform"
  PlatformRepo:
    type: String
    description: "GitHub repository URL for vistral-platform-v3 (SSH format)"
    default: "git@github.com:VistralAI/vistral-platform-v3.git"
  AWSRegion:
    type: String
    description: "AWS region"
    default: "us-east-1"
  Namespace:
    type: String
    description: "Kubernetes namespace for the platform"
    default: "vistral-platform"
  ValuesOverride:
    type: String
    description: "Optional values YAML override (base64 encoded)"
    default: ""

mainSteps:
  - action: aws:runShellScript
    name: deployPlatform
    inputs:
      timeoutSeconds: 3600
      runCommand:
        - |
          #!/bin/bash
          set -e

          export HOME=/root

          DEPLOY_KEY_SECRET="{{DeployKeySecretName}}"
          PLATFORM_REPO="{{PlatformRepo}}"
          AWS_REGION="{{AWSRegion}}"
          NAMESPACE="{{Namespace}}"
          VALUES_OVERRIDE="{{ValuesOverride}}"
          CHART_DIR="/opt/vistral-platform-v3"
          HELM_MANAGED_NAMESPACES="cvat automation video-processing"

          LOG="/var/log/vistral-platform-deploy.log"
          exec > >(tee -a "$LOG") 2>&1

          echo "=============================================="
          echo "Platform Deployment - $(date)"
          echo "=============================================="

          # =========================================================
          # Helper: force-delete a namespace by patching out its finalizer
          # =========================================================
          force_delete_namespace() {
              local ns="$1"
              if ! kubectl get namespace "$ns" &>/dev/null; then
                  return 0
              fi
              echo "  Force-deleting namespace $ns..."
              # Trigger deletion
              kubectl delete namespace "$ns" --ignore-not-found --wait=false 2>/dev/null || true
              # If stuck terminating, patch out the kubernetes finalizer directly
              if kubectl get namespace "$ns" &>/dev/null; then
                  kubectl get namespace "$ns" -o json 2>/dev/null \
                      | python3 -c "import sys,json; d=json.load(sys.stdin); d['spec']['finalizers']=[]; print(json.dumps(d))" \
                      | kubectl replace --raw "/api/v1/namespaces/$ns/finalize" -f - 2>/dev/null || true
              fi
              # Brief wait for it to disappear
              kubectl wait --for=delete namespace/"$ns" --timeout=30s 2>/dev/null || true
          }

          force_clean_namespaces() {
              for ns in $HELM_MANAGED_NAMESPACES; do
                  force_delete_namespace "$ns"
              done
          }

          # =========================================================
          # Helper: full release cleanup after failure
          # =========================================================
          cleanup_failed_release() {
              echo "Cleaning up failed release (preserving PVCs and namespaces)..."
              helm uninstall vistral-platform -n "$NAMESPACE" --no-hooks --wait=false 2>/dev/null || true
              # Clear stuck Helm operations (pending-install/pending-upgrade locks)
              kubectl delete secret -n "$NAMESPACE" -l owner=helm,status=pending-install --ignore-not-found 2>/dev/null || true
              kubectl delete secret -n "$NAMESPACE" -l owner=helm,status=pending-upgrade --ignore-not-found 2>/dev/null || true
              kubectl delete secret -n "$NAMESPACE" -l owner=helm,status=pending-rollback --ignore-not-found 2>/dev/null || true
              # Clean webhooks that block future installs
              kubectl delete validatingwebhookconfiguration ingress-nginx-admission --ignore-not-found 2>/dev/null || true
              kubectl delete mutatingwebhookconfiguration ingress-nginx-admission --ignore-not-found 2>/dev/null || true
              kubectl delete validatingwebhookconfiguration -l app.kubernetes.io/managed-by=Helm --ignore-not-found 2>/dev/null || true
              kubectl delete mutatingwebhookconfiguration -l app.kubernetes.io/managed-by=Helm --ignore-not-found 2>/dev/null || true
              # NOTE: PVCs and namespaces are intentionally preserved on failure.
              # Deleting them destroys database data and is unrecoverable.
          }

          # =========================================================
          # Guards
          # =========================================================

          # Must be primary control plane
          if [ ! -f /etc/kubernetes/admin.conf ]; then
              echo "Not a control plane. Skipping platform deploy."
              exit 0
          fi
          export KUBECONFIG=/etc/kubernetes/admin.conf

          HOSTNAME=$(hostname | tr '[:upper:]' '[:lower:]')
          # Only run on vausk01 to avoid duplicate deploys
          if [ "$HOSTNAME" != "vausk01" ]; then
              echo "Platform deploy runs only on vausk01. Current: $HOSTNAME. Skipping."
              exit 0
          fi

          # Guard: check if platform is already deployed and healthy
          if helm status vistral-platform -n "$NAMESPACE" &>/dev/null; then
              RELEASE_STATUS=$(helm status vistral-platform -n "$NAMESPACE" -o json 2>/dev/null | jq -r '.info.status' 2>/dev/null || echo "unknown")
              if [ "$RELEASE_STATUS" = "deployed" ]; then
                  echo "Platform already deployed (status: $RELEASE_STATUS). Skipping."
                  exit 0
              elif [ "$RELEASE_STATUS" = "failed" ] || [ "$RELEASE_STATUS" = "pending-install" ] || [ "$RELEASE_STATUS" = "pending-rollback" ] || [ "$RELEASE_STATUS" = "uninstalling" ]; then
                  echo "Platform in broken state: $RELEASE_STATUS. Cleaning up before retry..."
                  cleanup_failed_release
              else
                  echo "Platform exists but status: $RELEASE_STATUS. Will attempt upgrade."
              fi
          fi

          # =========================================================
          # Prerequisites
          # =========================================================

          if ! command -v aws &>/dev/null; then
              echo "Installing AWS CLI v2..."
              cd /tmp
              curl -sL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
              unzip -q awscliv2.zip
              ./aws/install --update
              rm -rf awscliv2.zip aws
          fi

          if ! command -v helm &>/dev/null; then
              echo "Installing Helm..."
              curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          fi

          # Host prerequisites — Longhorn needs iSCSI
          echo "Checking host prerequisites..."
          if ! command -v iscsiadm &>/dev/null; then
              echo "  Installing open-iscsi for Longhorn..."
              apt-get update -qq && apt-get install -y -qq open-iscsi 2>&1 || echo "  WARNING: failed to install open-iscsi"
          fi
          if ! systemctl is-active --quiet iscsid 2>/dev/null; then
              systemctl enable --now iscsid || echo "  WARNING: failed to enable iscsid"
          fi
          if ! lsmod | grep -q iscsi_tcp 2>/dev/null; then
              modprobe iscsi_tcp || echo "  WARNING: failed to load iscsi_tcp"
              echo "iscsi_tcp" > /etc/modules-load.d/iscsi.conf 2>/dev/null || true
          fi

          # =========================================================
          # Clone & build
          # =========================================================

          # Get deploy key
          DEPLOY_KEY=$(aws secretsmanager get-secret-value \
              --secret-id "$DEPLOY_KEY_SECRET" \
              --region "$AWS_REGION" \
              --query SecretString \
              --output text) || { echo "ERROR: Failed to get deploy key"; exit 1; }

          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/github_deploy
          chmod 600 ~/.ssh/github_deploy
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/github_deploy -o StrictHostKeyChecking=no"

          echo "Cloning vistral-platform-v3..."
          rm -rf "$CHART_DIR"
          git clone "$PLATFORM_REPO" "$CHART_DIR" || {
              echo "ERROR: Failed to clone platform repo"
              rm -f ~/.ssh/github_deploy
              exit 1
          }

          # Always cd to chart dir with absolute path (avoids getwd errors)
          cd "$CHART_DIR"

          # Always build fresh dependencies (needed for CRD extraction before repack)
          echo "Building Helm dependencies..."
          helm dependency build 2>/dev/null || helm dependency update

          # =========================================================
          # Pre-install CRDs (Helm doesn't reinstall CRDs on upgrade/reinstall)
          # =========================================================
          # Some subcharts (Longhorn, KEDA, External Secrets) put CRDs in
          # templates/ instead of crds/, so they get deleted on helm uninstall.
          # We extract and apply them directly to survive install/uninstall cycles.

          echo "Pre-installing CRDs from subcharts..."

          # We manage CRDs outside Helm because:
          # 1. Some charts put CRDs in templates/ which get deleted on helm uninstall
          # 2. Helm doesn't reinstall CRDs on upgrade
          # 3. Helm refuses to adopt pre-existing CRDs without ownership labels
          # Solution: apply CRDs ourselves, tell Helm to --skip-crds

          if [ -f charts/longhorn-*.tgz ]; then
              echo "  Longhorn CRDs..."
              LONGHORN_TGZ=$(ls charts/longhorn-*.tgz)
              helm template longhorn-crds "$LONGHORN_TGZ" --show-only templates/crds.yaml 2>/dev/null \
                  | kubectl apply --server-side --force-conflicts -f - 2>/dev/null || true
              # Remove crds.yaml from the tarball so Helm doesn't try to manage them
              # (Longhorn puts CRDs in templates/ with no conditional, --skip-crds doesn't apply)
              CRD_REPACK=$(mktemp -d)
              tar xzf "$LONGHORN_TGZ" -C "$CRD_REPACK"
              rm -f "$CRD_REPACK/longhorn/templates/crds.yaml"
              tar czf "$LONGHORN_TGZ" -C "$CRD_REPACK" longhorn
              rm -rf "$CRD_REPACK"
          fi

          if [ -f charts/keda-*.tgz ]; then
              echo "  KEDA CRDs..."
              helm template keda-crds charts/keda-*.tgz --show-only templates/crds/*.yaml 2>/dev/null \
                  | kubectl apply --server-side --force-conflicts -f - 2>/dev/null || true
          fi

          if [ -f charts/external-secrets-*.tgz ]; then
              echo "  External Secrets CRDs..."
              helm template es-crds charts/external-secrets-*.tgz --show-only templates/crds/*.yaml \
                  --set installCRDs=true 2>/dev/null \
                  | kubectl apply --server-side --force-conflicts -f - 2>/dev/null || true
          fi

          echo "CRDs pre-installed"

          # =========================================================
          # Bootstrap secrets (release namespace only)
          # =========================================================

          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

          echo "Secrets managed by External Secrets Operator (source: AWS Secrets Manager vistral-db-passwords)"

          # ESO needs AWS credentials to read from Secrets Manager
          kubectl create namespace external-secrets --dry-run=client -o yaml | kubectl apply -f -
          if ! kubectl get secret aws-credentials -n external-secrets &>/dev/null; then
              echo "Creating AWS credentials for External Secrets Operator..."
              ESO_ACCESS_KEY=$(aws secretsmanager get-secret-value --secret-id vistral/eso-credentials --region us-east-1 --query SecretString --output text 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['access-key-id'])" 2>/dev/null || echo "")
              ESO_SECRET_KEY=$(aws secretsmanager get-secret-value --secret-id vistral/eso-credentials --region us-east-1 --query SecretString --output text 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['secret-access-key'])" 2>/dev/null || echo "")
              if [ -n "$ESO_ACCESS_KEY" ] && [ -n "$ESO_SECRET_KEY" ]; then
                  kubectl create secret generic aws-credentials \
                      --namespace external-secrets \
                      --from-literal=access-key-id="$ESO_ACCESS_KEY" \
                      --from-literal=secret-access-key="$ESO_SECRET_KEY" \
                      --dry-run=client -o yaml | kubectl apply -f -
              else
                  echo "WARNING: Could not fetch ESO credentials from vistral/eso-credentials"
              fi
          fi

          # NGC image pull secret for NVIDIA container registry
          if ! kubectl get secret ngc-secret -n "$NAMESPACE" &>/dev/null; then
              echo "Creating NGC image pull secret..."
              NGC_KEY=$(aws secretsmanager get-secret-value --secret-id vistral/ngc-api-key --region us-east-1 --query SecretString --output text 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['api-key'])" 2>/dev/null || echo "")
              if [ -n "$NGC_KEY" ]; then
                  kubectl create secret docker-registry ngc-secret \
                      --namespace "$NAMESPACE" \
                      --docker-server=nvcr.io \
                      --docker-username='$oauthtoken' \
                      --docker-password="$NGC_KEY" \
                      --dry-run=client -o yaml | kubectl apply -f -
              else
                  echo "WARNING: Could not fetch NGC API key from vistral/ngc-api-key"
              fi
          fi

          # =========================================================
          # Pre-install cleanup
          # =========================================================

          # Prepare values override
          VALUES_ARGS="-f values.yaml"
          if [ -n "$VALUES_OVERRIDE" ]; then
              echo "$VALUES_OVERRIDE" | base64 -d > /tmp/override-values.yaml
              VALUES_ARGS="$VALUES_ARGS -f /tmp/override-values.yaml"
          fi

          # Clean stale admission webhooks
          echo "Cleaning stale resources..."
          kubectl delete validatingwebhookconfiguration ingress-nginx-admission --ignore-not-found 2>/dev/null || true
          kubectl delete mutatingwebhookconfiguration ingress-nginx-admission --ignore-not-found 2>/dev/null || true

          # Force-clean any terminating namespaces from previous failed runs
          force_clean_namespaces

          # =========================================================
          # Phase 1: Install operators (CRDs first, skip custom resources)
          # =========================================================

          echo "Phase 1: Installing operators (CRDs)..."
          cd "$CHART_DIR"
          if ! helm upgrade --install vistral-platform . \
              --namespace "$NAMESPACE" \
              --create-namespace \
              --skip-crds \
              $VALUES_ARGS \
              --set global.skipCustomResources=true \
              --set longhorn.enableCRDs=false \
              --set keda.crds.install=false \
              --set external-secrets.installCRDs=false \
              --timeout 10m; then
              echo "Phase 1 failed."
              cleanup_failed_release
              exit 1
          fi

          # Wait for operator CRDs to be registered
          echo "Waiting for CRDs..."
          for crd in externalsecrets.external-secrets.io scaledjobs.keda.sh; do
              for i in $(seq 1 60); do
                  if kubectl get crd "$crd" &>/dev/null; then
                      echo "  CRD $crd ready"
                      break
                  fi
                  if [ "$i" -eq 60 ]; then
                      echo "  WARNING: CRD $crd not found after 5 minutes, continuing anyway"
                  fi
                  sleep 5
              done
          done

          # =========================================================
          # Phase 2: Full deploy with custom resources enabled
          # =========================================================

          echo "Phase 2: Full platform deployment..."
          cd "$CHART_DIR"
          if ! helm upgrade vistral-platform . \
              --namespace "$NAMESPACE" \
              --skip-crds \
              $VALUES_ARGS \
              --set longhorn.enableCRDs=false \
              --set keda.crds.install=false \
              --set external-secrets.installCRDs=false \
              --timeout 45m; then
              echo "Phase 2 failed."
              cleanup_failed_release
              exit 1
          fi

          echo "Platform deployment complete"

          # =========================================================
          # Post-deploy: ArgoCD bootstrap
          # =========================================================

          if [ -f argocd/install.sh ]; then
              echo "Bootstrapping ArgoCD..."
              cd "$CHART_DIR/argocd"
              chmod +x install.sh
              bash install.sh
              echo "ArgoCD bootstrap complete"
          fi

          # Cleanup
          rm -f ~/.ssh/github_deploy
          rm -f /tmp/override-values.yaml

          echo "=============================================="
          echo "Platform deployment complete at $(date)"
          echo "=============================================="
